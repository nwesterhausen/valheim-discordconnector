name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Caching build dependencies
      - name: Dev Bundle Cache
        id: cache-dev-bundle
        uses: actions/cache@v3
        with:
          key: ${{ vars.VALHEIM_VERSION }}
          path: /home/runner/dev-bundle

      # Populate build dependencies (if not cached)
      - name: Download Build Dependencies Bundle
        if: ${{ steps.cache-dev-bundle.outputs.cache-hit != 'true'}}
        run: |
          wget -O dev-bundle.zip ${{ secrets.VDC_DEV_BUNDLE }}${{ vars.VALHEIM_VERSION }}.zip
          unzip -qq dev-bundle.zip -d /home/runner/dev-bundle

      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        # Specifying the "GamePath" as our build dependency directory (cached)
        run: dotnet restore /p:GamePath=/home/runner/dev-bundle -v n
      - name: Build
        # Specifying the "GamePath" as our build dependency directory (cached)
        run:
          dotnet build --no-restore -c Release /p:GamePath=/home/runner/dev-bundle -v n

          # Extract the deterministic hash from the compiled assembly
      - name: Extract Deterministic Hash
        run: |
          # Extract the hash from the compiled assembly
          DETERMINISTIC_HASH=$(ildasm /text /noil /out=- /metadata /public /typelist /nobar /rawbytes /assembly=/home/runner/work/valheim-discordconnector/valheim-discordconnector/bin/Release/net6.0/DiscordConnector.dll | grep "publickeytoken" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
          echo "DETERMINISTIC_HASH=$DETERMINISTIC_HASH" >> $GITHUB_ENV

      # Create the metadata.txt file
      - name: Create metadata.txt file
        run: |
          echo "Commit Hash: $(git rev-parse HEAD)" >> metadata.txt
          echo "Branch Name: $(git branch --show-current)" >> metadata.txt
          echo "Compile Date: $(date +%Y-%m-%d)" >> metadata.txt
          echo "Compile Time: $(date +%H:%M:%S)" >> metadata.txt
          echo "Valheim Version: ${{ vars.VALHEIM_VERSION }}" >> metadata.txt
          echo "Dotnet Version: $(dotnet --version)" >> metadata.txt
          echo "Deterministic Hash: $DETERMINISTIC_HASH" >> metadata.txt

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v3
        with:
          # Artifact name
          name: DiscordConnector-artifact.zip
          # A file, directory or wildcard pattern that describes what to upload
          path: |
            /home/runner/work/valheim-discordconnector/valheim-discordconnector/bin/DiscordConnector.zip
            metatdata.txt
          # The desired behavior if no files are found using the provided path.
          # Duration after which artifact will expire in days. 0 means using default retention.
          # Minimum 1 day. Maximum 90 days unless changed from the repository settings page.
          retention-days: 30
